    <ellipse cx="-22" cy="-22" rx="9" ry="3.4"/><ellipse cx="22" cy="-22" rx="9" ry="3.4"/><ellipse cx="-22" cy="22" rx="9" ry="3.4"/><ellipse cx="22" cy="22" rx="9" ry="3.4"/>
  </g>
  <text x="762" y="642" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="1">AERIAL SURVEYING</text>
  <text x="763" y="660" font-size="9.5" fill="#19c3f5" letter-spacing="3">UAV SURVEY &amp; INSPECTION · IRELAND</text>
  <line x1="708" y1="672" x2="1092" y2="672" stroke="#1d3a5c"/>
  <g font-size="9" fill="#9fb6cc">
    <text x="708" y="690">CLIENT</text><text x="708" y="704" font-size="11" fill="#fff" font-weight="700">Meridian Roofing &amp; Solar Ltd</text>
