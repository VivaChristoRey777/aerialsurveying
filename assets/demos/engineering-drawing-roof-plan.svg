    <line x1="900" y1="678" x2="900" y2="770" stroke="#1d3a5c"/>
    <text x="912" y="690">DRG No.</text><text x="912" y="703" font-size="11" fill="#fff" font-weight="700">AS-RP-014</text>
    <text x="912" y="722">SCALE</text><text x="912" y="735" font-size="11" fill="#fff" font-weight="700">1:100 @ A3</text>
    <text x="1010" y="690">REV</text><text x="1010" y="703" font-size="11" fill="#19c3f5" font-weight="700">C</text>
    <text x="1010" y="722">DATE</text><text x="1010" y="735" font-size="11" fill="#fff" font-weight="700">20.06.26</text>
  </g>
  <line x1="708" y1="748" x2="1092" y2="748" stroke="#1d3a5c"/>
  <text x="708" y="764" font-size="9" fill="#9fb6cc">aerialsurveying.ie · 089 481 3390 · IAA-compliant · Fully insured · 24–48 hr turnaround</text>
