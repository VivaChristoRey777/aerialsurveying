<svg viewBox="0 0 1120 792" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk','Inter','Segoe UI',Arial,sans-serif" role="img" aria-labelledby="ttl dsc">
<title id="ttl">Aerial Surveying — Roof Plan engineering drawing</title>
<desc id="dsc">A technical CAD-style roof plan showing a solar PV zone, HVAC plant, roof drains with fall arrows, dimensions in metres, grid axes, north arrow, graphic scale bar, legend, revision table and a branded title block.</desc>
<defs>
  <marker id="ah" markerWidth="11" markerHeight="9" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#0b1f3a"/></marker>
  <marker id="ahs" markerWidth="9" markerHeight="8" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#3b6e93"/></marker>
  <pattern id="grid" width="19" height="19" patternUnits="userSpaceOnUse"><path d="M19 0 H0 V19" fill="none" stroke="#eef2f6" stroke-width="1"/></pattern>
  <pattern id="pv" width="27" height="19" patternUnits="userSpaceOnUse"><rect width="27" height="19" fill="#cfe0ef"/><rect x="1.2" y="1.2" width="24.6" height="16.6" fill="#bcd4e8" stroke="#3b6e93" stroke-width="0.9"/><line x1="13.5" y1="1.2" x2="13.5" y2="17.8" stroke="#3b6e93" stroke-width="0.5"/></pattern>
  <pattern id="seam" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(0)"><line x1="0" y1="0" x2="0" y2="16" stroke="#cfd8e2" stroke-width="0.8"/></pattern>
</defs>

<!-- sheet -->
<rect x="0" y="0" width="1120" height="792" fill="#ffffff"/>
<rect x="14" y="14" width="1092" height="764" fill="none" stroke="#0b1f3a" stroke-width="2.5"/>
<rect x="22" y="22" width="1076" height="748" fill="none" stroke="#0b1f3a" stroke-width="0.8"/>

<!-- ===== DRAWING AREA (left) ===== -->
<rect x="30" y="40" width="650" height="712" fill="url(#grid)"/>
<text x="44" y="62" font-size="13" letter-spacing="2" fill="#19c3f5" font-weight="700">ROOF PLAN — SOLAR &amp; PLANT LAYOUT</text>
<text x="44" y="78" font-size="10" fill="#5b6b7d" letter-spacing="1">SCALE 1:100 @ A3 · ALL DIMENSIONS IN METRES</text>

<!-- grid axis bubbles (top: A B C) -->
<g font-size="11" font-weight="700" fill="#0b1f3a" text-anchor="middle">
  <line x1="200" y1="150" x2="200" y2="544" stroke="#9fb0c0" stroke-width="0.7" stroke-dasharray="2 4"/>
  <line x1="392" y1="150" x2="392" y2="544" stroke="#9fb0c0" stroke-width="0.7" stroke-dasharray="2 4"/>
  <line x1="584" y1="150" x2="584" y2="544" stroke="#9fb0c0" stroke-width="0.7" stroke-dasharray="2 4"/>
  <circle cx="200" cy="142" r="11" fill="#fff" stroke="#0b1f3a"/><text x="200" y="146">A</text>
  <circle cx="392" cy="142" r="11" fill="#fff" stroke="#0b1f3a"/><text x="392" y="146">B</text>
  <circle cx="584" cy="142" r="11" fill="#fff" stroke="#0b1f3a"/><text x="584" y="146">C</text>
  <!-- left: 1 2 3 -->
  <line x1="150" y1="240" x2="584" y2="240" stroke="#9fb0c0" stroke-width="0.7" stroke-dasharray="2 4"/>
  <line x1="150" y1="392" x2="584" y2="392" stroke="#9fb0c0" stroke-width="0.7" stroke-dasharray="2 4"/>
  <line x1="150" y1="544" x2="584" y2="544" stroke="#9fb0c0" stroke-width="0.7" stroke-dasharray="2 4"/>
  <circle cx="138" cy="240" r="11" fill="#fff" stroke="#0b1f3a"/><text x="138" y="244">1</text>
  <circle cx="138" cy="392" r="11" fill="#fff" stroke="#0b1f3a"/><text x="138" y="396">2</text>
  <circle cx="138" cy="544" r="11" fill="#fff" stroke="#0b1f3a"/><text x="138" y="548">3</text>
</g>

<!-- roof membrane fill + parapet -->
<rect x="200" y="240" width="384" height="304" fill="url(#seam)"/>
<rect x="200" y="240" width="384" height="304" fill="#f4f8fb" fill-opacity="0.55"/>
<rect x="200" y="240" width="384" height="304" fill="none" stroke="#0b1f3a" stroke-width="2.4"/>
<rect x="210" y="250" width="364" height="284" fill="none" stroke="#5b6b7d" stroke-width="1" stroke-dasharray="6 4"/>

<!-- solar PV zone -->
<rect x="232" y="278" width="208" height="104" fill="url(#pv)" stroke="#1f4e74" stroke-width="1.6"/>
<text x="336" y="332" font-size="11" font-weight="700" fill="#15405f" text-anchor="middle">SOLAR PV ZONE</text>
<text x="336" y="346" font-size="9" fill="#15405f" text-anchor="middle">48 modules · 21.6 kWp</text>

<!-- HVAC plant units (3) -->
<g stroke="#0b1f3a" stroke-width="1.4" fill="#eef2f6">
  <rect x="470" y="430" width="44" height="38"/><circle cx="492" cy="449" r="13" fill="none"/><path d="M492 449 L500 443 M492 449 L484 455 M492 449 L498 458" stroke="#5b6b7d" stroke-width="1"/>
  <rect x="470" y="474" width="44" height="38"/><circle cx="492" cy="493" r="13" fill="none"/><path d="M492 493 L500 487 M492 493 L484 499 M492 493 L498 502" stroke="#5b6b7d" stroke-width="1"/>
  <rect x="520" y="452" width="44" height="38"/><circle cx="542" cy="471" r="13" fill="none"/><path d="M542 471 L550 465 M542 471 L534 477 M542 471 L548 480" stroke="#5b6b7d" stroke-width="1"/>
</g>
<text x="516" y="425" font-size="10" font-weight="700" fill="#0b1f3a" text-anchor="middle">HVAC PLANT — 3 No.</text>

<!-- roof access hatch -->
<rect x="232" y="470" width="30" height="30" fill="#fff" stroke="#0b1f3a" stroke-width="1.4"/><path d="M232 470 L262 500 M262 470 L232 500" stroke="#0b1f3a" stroke-width="0.9"/>
<text x="247" y="514" font-size="8.5" fill="#0b1f3a" text-anchor="middle">ACCESS</text>

<!-- rooflights -->
<g fill="#dbe9f4" stroke="#1f4e74" stroke-width="1.1"><rect x="300" y="430" width="22" height="22"/><rect x="332" y="430" width="22" height="22"/><rect x="364" y="430" width="22" height="22"/></g>
<text x="343" y="468" font-size="8.5" fill="#15405f" text-anchor="middle">ROOFLIGHTS</text>

