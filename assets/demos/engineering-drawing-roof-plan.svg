  <circle cx="250" cy="410" r="6" fill="#fff" stroke="#0b1f3a" stroke-width="1.3"/><rect x="244" y="404" width="12" height="12" fill="none" stroke="#0b1f3a" stroke-width="0.8"/>
  <circle cx="540" cy="300" r="6" fill="#fff" stroke="#0b1f3a" stroke-width="1.3"/><rect x="534" y="294" width="12" height="12" fill="none" stroke="#0b1f3a" stroke-width="0.8"/>
  <line x1="300" y1="392" x2="262" y2="408" stroke="#19c3f5" stroke-width="1.4" marker-end="url(#ahs)"/>
  <line x1="500" y1="320" x2="528" y2="304" stroke="#19c3f5" stroke-width="1.4" marker-end="url(#ahs)"/>
  <text x="320" y="388" font-size="8" fill="#0b7ea6">FALL 1:80</text>
</g>

<!-- ===== DIMENSIONS ===== -->
<!-- overall width 24.00 (top) -->
<g stroke="#0b1f3a" stroke-width="1">
  <line x1="200" y1="240" x2="200" y2="196"/><line x1="584" y1="240" x2="584" y2="196"/>
  <line x1="200" y1="200" x2="584" y2="200" marker-start="url(#ah)" marker-end="url(#ah)"/>
</g>
<rect x="356" y="190" width="72" height="16" fill="#fff"/><text x="392" y="202" font-size="12" font-weight="700" fill="#0b1f3a" text-anchor="middle">24.00 m</text>

<!-- overall depth 19.00 (left) -->
<g stroke="#0b1f3a" stroke-width="1">
  <line x1="200" y1="240" x2="166" y2="240"/><line x1="200" y1="544" x2="166" y2="544"/>
  <line x1="170" y1="240" x2="170" y2="544" marker-start="url(#ah)" marker-end="url(#ah)"/>
</g>
<g transform="rotate(-90 170 392)"><rect x="134" y="384" width="72" height="16" fill="#fff"/><text x="170" y="396" font-size="12" font-weight="700" fill="#0b1f3a" text-anchor="middle">19.00 m</text></g>

<!-- PV zone width 13.00 -->
<g stroke="#3b6e93" stroke-width="0.9">
  <line x1="232" y1="382" x2="232" y2="402"/><line x1="440" y1="382" x2="440" y2="402"/>
  <line x1="232" y1="396" x2="440" y2="396" marker-start="url(#ahs)" marker-end="url(#ahs)"/>
</g>
<rect x="306" y="389" width="60" height="14" fill="#fff"/><text x="336" y="400" font-size="10" font-weight="700" fill="#15405f" text-anchor="middle">13.00 m</text>

<!-- setback 1.50 -->
<g stroke="#3b6e93" stroke-width="0.9"><line x1="200" y1="264" x2="232" y2="264" marker-start="url(#ahs)" marker-end="url(#ahs)"/></g>
<text x="216" y="259" font-size="8.5" fill="#15405f" text-anchor="middle">1.50</text>

<!-- section marker -->
<g stroke="#19c3f5" stroke-width="2"><line x1="200" y1="560" x2="584" y2="560"/></g>
<g fill="#0b1f3a"><circle cx="196" cy="560" r="10" fill="#0b1f3a"/><text x="196" y="564" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">A</text><circle cx="588" cy="560" r="10" fill="#0b1f3a"/><text x="588" y="564" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">A</text></g>
<text x="392" y="556" font-size="9" fill="#0b7ea6" text-anchor="middle">SECTION A–A</text>

<!-- north arrow -->
<g transform="translate(626,120)"><circle r="26" fill="#fff" stroke="#0b1f3a" stroke-width="1.4"/><path d="M0,-20 L7,8 L0,1 L-7,8 Z" fill="#0b1f3a"/><path d="M0,-20 L7,8 L0,1 Z" fill="#19c3f5"/><text x="0" y="-28" font-size="12" font-weight="700" fill="#0b1f3a" text-anchor="middle">N</text></g>

<!-- graphic scale bar -->
<g transform="translate(200,640)">
  <text x="0" y="-8" font-size="9" fill="#5b6b7d" letter-spacing="1">SCALE 1:100</text>
  <rect x="0" y="0" width="40" height="9" fill="#0b1f3a"/><rect x="40" y="0" width="40" height="9" fill="#fff" stroke="#0b1f3a" stroke-width="1"/><rect x="80" y="0" width="40" height="9" fill="#0b1f3a"/><rect x="120" y="0" width="40" height="9" fill="#fff" stroke="#0b1f3a" stroke-width="1"/>
  <g font-size="9" fill="#0b1f3a" text-anchor="middle"><text x="0" y="24">0</text><text x="40" y="24">2.5</text><text x="80" y="24">5</text><text x="160" y="24">10 m</text></g>
</g>

<!-- ===== RIGHT COLUMN ===== -->
<!-- revision table -->
<g font-size="9.5" fill="#0b1f3a">
  <rect x="696" y="56" width="408" height="96" fill="#fff" stroke="#0b1f3a" stroke-width="1.2"/>
  <rect x="696" y="56" width="408" height="18" fill="#0b1f3a"/>
  <text x="704" y="69" fill="#fff" font-weight="700" letter-spacing="1">REVISIONS</text>
  <line x1="734" y1="74" x2="734" y2="152" stroke="#9fb0c0"/><line x1="800" y1="74" x2="800" y2="152" stroke="#9fb0c0"/><line x1="1040" y1="74" x2="1040" y2="152" stroke="#9fb0c0"/>
  <g font-weight="700"><text x="703" y="87">REV</text><text x="742" y="87">DATE</text><text x="808" y="87">DESCRIPTION</text><text x="1048" y="87">BY</text></g>
  <line x1="696" y1="92" x2="1104" y2="92" stroke="#0b1f3a"/>
  <text x="710" y="107">A</text><text x="742" y="107">02.06.26</text><text x="808" y="107">Issued for review</text><text x="1050" y="107">JM</text>
  <text x="710" y="124">B</text><text x="742" y="124">11.06.26</text><text x="808" y="124">Plant layout added</text><text x="1050" y="124">JM</text>
  <text x="710" y="141">C</text><text x="742" y="141">20.06.26</text><text x="808" y="141">Solar zone revised</text><text x="1050" y="141">JM</text>
</g>

<!-- legend -->
<g font-size="10.5" fill="#0b1f3a">
  <rect x="696" y="168" width="408" height="196" fill="#fff" stroke="#0b1f3a" stroke-width="1.2"/>
  <rect x="696" y="168" width="408" height="18" fill="#0b1f3a"/><text x="704" y="181" fill="#fff" font-weight="700" letter-spacing="1">LEGEND</text>
  <g transform="translate(712,200)">
    <rect x="0" y="0" width="26" height="16" fill="url(#pv)" stroke="#1f4e74"/><text x="36" y="12">Solar PV module zone</text>
    <rect x="0" y="28" width="26" height="16" fill="#eef2f6" stroke="#0b1f3a"/><circle cx="13" cy="36" r="6" fill="none" stroke="#5b6b7d"/><text x="36" y="40">HVAC / mechanical plant</text>
    <g transform="translate(0,56)"><circle cx="13" cy="8" r="6" fill="#fff" stroke="#0b1f3a"/><rect x="7" y="2" width="12" height="12" fill="none" stroke="#0b1f3a" stroke-width="0.8"/><text x="36" y="12">Roof drain / rainwater outlet</text></g>
    <g transform="translate(0,84)"><rect x="0" y="0" width="16" height="16" fill="#fff" stroke="#0b1f3a"/><path d="M0 0 L16 16 M16 0 L0 16" stroke="#0b1f3a" stroke-width="0.8"/><text x="36" y="12">Roof access hatch</text></g>
    <g transform="translate(0,112)"><line x1="0" y1="8" x2="26" y2="8" stroke="#19c3f5" stroke-width="1.6" marker-end="url(#ahs)"/><text x="36" y="12">Direction of fall</text></g>
    <g transform="translate(0,140)"><line x1="0" y1="8" x2="26" y2="8" stroke="#0b1f3a" stroke-width="1" marker-start="url(#ah)" marker-end="url(#ah)"/><text x="36" y="12">Dimension (metres)</text></g>
  </g>
</g>

<!-- survey notes -->
<g font-size="10" fill="#0b1f3a">
  <rect x="696" y="380" width="408" height="216" fill="#fff" stroke="#0b1f3a" stroke-width="1.2"/>
  <rect x="696" y="380" width="408" height="18" fill="#0b1f3a"/><text x="704" y="393" fill="#fff" font-weight="700" letter-spacing="1">SURVEY NOTES</text>
  <g fill="#27384a" font-size="10">
    <text x="708" y="416">1.  Survey method: UAV aerial photogrammetry.</text>
    <text x="708" y="434">2.  Platform: DJI Mini 4 Pro · GSD ≈ 12 mm/px.</text>
    <text x="708" y="452">3.  Horizontal datum: Irish Transverse Mercator (ITM).</text>
    <text x="708" y="470">4.  Levels to Ordnance Datum Malin Head.</text>
    <text x="708" y="488">5.  All dimensions in metres unless noted. Do not scale.</text>
    <text x="708" y="506">6.  Verify all critical dims on site before fabrication.</text>
    <text x="708" y="524">7.  Plant positions indicative — confirm with M&amp;E.</text>
    <text x="708" y="542">8.  Flight conducted under IAA SUA registration.</text>
    <text x="708" y="566" fill="#0b7ea6" font-weight="700">© Aerial Surveying — issued for the named project only.</text>
  </g>
</g>

